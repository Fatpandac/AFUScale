<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12D6A6"/>
      <stop offset="1" stop-color="#0A84FF"/>
    </linearGradient>
    <linearGradient id="dial" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0FB894"/>
      <stop offset="1" stop-color="#0A84FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#003a4d" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- full-bleed background; iOS masks to squircle -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- scale plate -->
  <rect x="212" y="212" width="600" height="600" rx="132" fill="#FFFFFF" filter="url(#soft)"/>

  <!-- dial ring -->
  <circle cx="512" cy="470" r="176" fill="none" stroke="#E6EEF2" stroke-width="40"/>
  <!-- progress arc: from bottom-left sweeping to top-right (~70%) -->
  <path d="M 388 594 A 176 176 0 1 1 660 570"
        fill="none" stroke="url(#dial)" stroke-width="40" stroke-linecap="round"/>

  <!-- needle -->
  <g transform="rotate(38 512 470)">
    <rect x="500" y="330" width="24" height="150" rx="12" fill="#0A84FF"/>
  </g>
  <circle cx="512" cy="470" r="34" fill="#0A84FF"/>
  <circle cx="512" cy="470" r="14" fill="#FFFFFF"/>

  <!-- kg label -->
  <text x="512" y="726" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700"
        fill="#0FB894" letter-spacing="4">kg</text>
</svg>
