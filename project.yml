name: AFUScale
options:
  bundleIdPrefix: com.fatpandac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
targets:
  AFUScale:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fatpandac.AFUScale
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: 1
    entitlements:
      path: App/AFUScale.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies: []
  AFUScaleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: AFUScale
